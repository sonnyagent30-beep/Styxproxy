# ── bunche.ng — Main Site (static) ────────────────────────────
server {
    listen 443 ssl http2;
    server_name bunche.ng www.bunche.ng;

    ssl_certificate     /etc/letsencrypt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    root /usr/share/nginx/html;
    index index.html;

    # Static site — display only, zero business logic
    location / {
        try_files $uri $uri/ =404;
    }

    # Block all API/backend access from main domain
    location /api/ {
        deny all;
    }
}

# ── api.bunche.ng — FastAPI Backend ────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.bunche.ng;

    ssl_certificate     /etc/letsencrypt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    limit_req zone=api_limit burst=50 nodelay;

    location / {
        proxy_pass http://api:8000;
    }
}

# ── n8n.bunche.ng — n8n Automation ────────────────────────────
server {
    listen 443 ssl http2;
    server_name n8n.bunche.ng;

    ssl_certificate     /etc/letsencrypt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    location / {
        proxy_pass http://n8n:5678;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }
}

# ── HTTP → HTTPS redirect (all hosts) ────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
