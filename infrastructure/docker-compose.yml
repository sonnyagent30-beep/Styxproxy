# Bunche — Docker Compose
# ─────────────────────────────────────────────
# Services: api, n8n, postgres, redis, nginx
# Usage:   docker compose up -d
# Env:     cp .env.production.example .env && edit .env
# ─────────────────────────────────────────────

name: bunche

services:

  # ── Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bunche
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d bunche"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bunche_net

  # ── Cache / Queue ────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bunche_net

  # ── API Backend ──────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/bunche
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bunche_net

  # ── n8n Workflow Automation ──────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOSTNAME: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: bunche
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_POSTGRES_DB: n8n
      EXECUTIONS_MODE: regular
      EXECUTIONS_TIMEOUT: 300
      GENERIC_TIMEZONE: Africa/Lagos
      N8N_LOG_LEVEL: info
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bunche_net

  # ── Reverse Proxy + SSL ──────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl-params.conf:/etc/nginx/snippets/ssl-params.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - api
      - n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - bunche_net

  # ── Certbot (run manually for SSL) ───────────
  certbot:
    image: certbot/certbot:latest
    restart: "no"
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot

networks:
  bunche_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  certbot_data:
  certbot_www:
