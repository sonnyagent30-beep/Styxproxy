# PgBouncer configuration for Bunche
# n8n connects here. FastAPI uses asyncpg directly to postgres.

[databases]
bunche = host=postgres port=5432 dbname=bunche

[pgbouncer]
listen_addr = *
listen_port = 5432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction
max_client_conn = 500
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 100

# Log
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

# Performance
server_reset_query = DISCARD ALL
server_check_delay = 30
server_lifetime = 3600
server_idle_timeout = 600

# Query timeout (n8n workflows should not hang)
query_timeout = 300
idle_transaction_timeout = 300
