name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: styxproxy
          POSTGRES_PASSWORD: styxproxy
          POSTGRES_DB: styxproxy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -q -e .
          pip install -q aiosqlite pytest pytest-asyncio pytest-xdist pytest.ini 2>/dev/null

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://styxproxy:styxproxy@localhost:5432/styxproxy_test
          JWT_SECRET: test-jwt-secret-not-real
          ADMIN_TOKEN: test-admin-token-not-real
        run: |
          cd backend
          pytest tests/ -q --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff > /dev/null 2>&1
      - run: ruff check backend/app/ --select=E,F,I
      - run: python3 -m py_compile backend/app/*.py backend/app/**/*.py

  structure:
    name: Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files exist
        run: |
          test -f backend/app/main.py
          test -f backend/app/models.py
          test -f backend/app/config.py
          test -f backend/alembic/versions/001_initial.py
          echo "All required files present"
